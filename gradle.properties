android.useAndroidX=true
org.gradle.jvmargs=-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError
sdkVersion=1.0.34

# SPEC-070-A J.25 — library-friendly Gradle flags.
# nonTransitiveRClass: each module gets its own R, prevents bloat for hosts.
# enableJetifier=false: we only depend on AndroidX, so the support-lib rewrite
# tool can stay off and shave a few seconds off every build.
# kotlin.code.style=official: pin formatter to Kotlin official style guide.
android.nonTransitiveRClass=true
android.enableJetifier=false
kotlin.code.style=official

# AppDNA cross-platform feature-parity marker (SPEC-070-0).
# Android SDK 1.0.34 wraps iOS 1.0.62: 1.0.34 is the cross-account-entitlement-
# leak hotfix on top of 1.0.33 — both halves of Bogdan's reproducer fix
# (write-side: setObfuscatedAccountId fallback to AppAccountTokenResolver when
# host doesn't pass options.appAccountToken; read-side: filter every
# queryPurchasesAsync result by current user's obfuscatedAccountId via
# EntitlementOwnerFilter). Mirrors iOS 1.0.62. CI (`pnpm check:version-lockstep`)
# enforces parity equality with iOS s.version.
appdnaFeatureParity=1.0.62
