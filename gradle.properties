android.useAndroidX=true
org.gradle.jvmargs=-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError
sdkVersion=1.0.35

# SPEC-070-A J.25 — library-friendly Gradle flags.
# nonTransitiveRClass: each module gets its own R, prevents bloat for hosts.
# enableJetifier=false: we only depend on AndroidX, so the support-lib rewrite
# tool can stay off and shave a few seconds off every build.
# kotlin.code.style=official: pin formatter to Kotlin official style guide.
android.nonTransitiveRClass=true
android.enableJetifier=false
kotlin.code.style=official

# AppDNA cross-platform feature-parity marker (SPEC-070-0).
# Android SDK 1.0.35 wraps iOS 1.0.63: 1.0.35 closes the v1.0.62 cross-account-
# entitlement-leak follow-up Bogdan reproduced on the SDK-driven onboarding-
# paywall flow. The migration-tolerant policy that previously granted any
# untagged historical purchase to whoever was identified now scopes the grant
# to the device's FIRST identified user — preventing a later user-switch from
# inheriting untagged purchases made before the host called identify(). Mirrors
# iOS 1.0.63. CI (`pnpm check:version-lockstep`) enforces parity equality with
# iOS s.version.
appdnaFeatureParity=1.0.63
