android.useAndroidX=true
org.gradle.jvmargs=-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError
sdkVersion=1.0.60

# AppDNA cross-platform feature-parity marker (SPEC-070-0).
# Android SDK is currently catching up to iOS via SPEC-070-A. The parity
# value below is what Android CLAIMS to wrap; CI (`pnpm check:version-lockstep`)
# enforces equality with iOS s.version once SPEC-070-A ships and SPEC_070_A_COMPLETE=true.
appdnaFeatureParity=1.0.60
