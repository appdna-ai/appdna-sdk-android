# SPEC-419 — pin all Robolectric tests to SDK 34. Required alongside
# testOptions.unitTests.isIncludeAndroidResources=true (added so Compose Material3
# components like OutlinedTextField can resolve their library string resources):
# with resources enabled Robolectric reads the merged manifest (targetSdk 35), which
# exceeds this Robolectric version's max (34) and fails test-class init with
# "targetSdkVersion=35 > maxSdkVersion=34". Pinning sdk=34 here makes every test run
# on 34 (matching the snapshot tests' explicit @Config(sdk=[34])) and avoids the clash.
sdk=34
